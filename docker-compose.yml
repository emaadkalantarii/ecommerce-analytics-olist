version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: olist_postgres
    environment:
      POSTGRES_DB: olist_db
      POSTGRES_USER: olist_user
      POSTGRES_PASSWORD: olist_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: